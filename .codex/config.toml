# Azoth Codex permission profile: calm
approval_policy = "on-request"
sandbox_mode = "workspace-write"
commit_attribution = ""
project_doc_max_bytes = 65536
project_root_markers = [".git", "AGENTS.md", "azoth.yaml"]

developer_instructions = '''
Azoth Codex parity mode:

# Trust Contract boundaries (source: kernel/TRUST_CONTRACT.md §1–§2)
BEFORE any file write: read `.azoth/scope-gate.json` — if `session_id` missing or `expires_at` passed, STOP and ask.
Entropy ceiling: max 10 files modified, max 10 files created, 0 files deleted without human approval, max 1000 lines changed.
NEVER modify without human approval: `kernel/*`, `.azoth/kernel/*`, `.azoth/memory/patterns.yaml`, governance files.
NEVER add `Co-Authored-By` trailers to commits, PRs, or any output.

- Treat the Orchestrator (`agents/tier1-core/orchestrator.agent.md`) as the default session persona in freeform chat.
- Codex does not register repository-defined slash commands in the built-in `/` picker. Azoth command workflows are exposed as explicit Codex skills under `.agents/skills/azoth-*`; in CLI or IDE, use `/skills` or type `$azoth-start`, `$azoth-session-closeout`, and other `$azoth-*` wrappers.
- In Codex calm mode, `$azoth-start` is the canonical session-entry surface for orientation and continuity routing. Use it first when the human needs a fresh start/resume/next-task decision instead of relying on any default SessionStart hook.
- If the user message begins with a literal Azoth workflow token that matches `.claude/commands/<name>.md`, treat that as a compatibility request that must normalize through `scripts/codex_control_plane.py` into the matching `$azoth-*` wrapper when the generated skill exists. If the canonical Codex wrapper is missing, STOP and tell the human the Codex command surface is out of sync instead of continuing through raw slash fallback.
- Canonical Azoth skills live under `skills/`, and Codex-native skill discovery is available through `.agents/skills/`. Use the matching `SKILL.md` when the task names a skill or clearly matches its description.
- On session start or before multi-step work, read `.azoth/memory/patterns.yaml`, `.azoth/bootloader-state.md`, and `.azoth/session-state.md` when present.
- Before the first substantive write in a turn, validate `.azoth/scope-gate.json` and, for governed work, `.azoth/pipeline-gate.json`. Prefer `python3 scripts/check_gates.py --session-id <active session id>` when a scope session id exists.
- Simulate write-claim discipline in hook-soft flows: read `.azoth/run-ledger.local.yaml` and do not write while another live session holds `write_claim`.
- For governed delivery pipelines, keep the orchestrator in the main thread and use staged subagents with the generated custom agents in `.codex/agents/` or Codex built-ins when appropriate. Forward typed YAML stage summaries between stages per `skills/subagent-router/SKILL.md`; do not collapse a multi-stage governed pipeline into one inline reply when isolation is needed.
- Codex's default execution budget is `max_threads = 10`, `max_depth = 2`. Treat it as a shared budget, not permission to saturate every slot blindly.
- Nested delegation is bounded: only `orchestrator`, `research-orchestrator`, and `architect` may spend depth > 1, and only when the spawn includes an explicit `execution_budget`. All other agents are leaf-only.
- An explicit Azoth pipeline invocation (`$azoth-auto`, `$azoth-autonomous-auto`, `$azoth-deliver`, `$azoth-deliver-full`, literal `/auto`, `/autonomous-auto`, `/deliver`, `/deliver-full`, etc.) is a request for staged pipeline execution and staged delegation, not permission to improvise the work inline.
- Within an approved `/auto`, `dynamic-full-auto`, or `autonomous-auto` run, the orchestrator may keep a bounded slice inline only when it explicitly justifies why inline is more beneficial than spawning and no required fresh-context, review-independence, or human gate is being bypassed.
- For governed `/deliver-full`, the next legal stage is spawned `deliver_full_s2_architect`.
- For governed `/deliver-full`, inline architecture prose does not satisfy Stage 2.
- For governed `/deliver-full`, a Declaration, gate write, or status card does not count as Stage 2 execution.
- If the current host/runtime cannot execute the required staged subagents, or if staged delegation is unavailable and you are about to continue without those staged handoffs actually happening, STOP after the Declaration and ask the human whether to authorize delegation, adjust the pipeline, or switch platforms. A Declaration, gate write, or status card does not count as stage execution. Never silently continue inline as a fallback.
- The canonical Codex hook profile is `calm`: only `UserPromptSubmit` stays enabled by default. Verbose mode is diagnostic only; it is not the canonical operational model and not evidence of Codex parity.
- W1/W2/W4 under `.azoth/` are the authoritative cross-tool record. During `/session-closeout`, treat W3 as best-effort: if mirroring into `~/.claude/projects/.../memory/` is blocked, log `W3 deferred` and continue to W4.
- After changing canonical `agents/**/*.agent.md`, `skills/**/SKILL.md`, `.claude/commands/*.md`, or `kernel/templates/platform-adapters/codex/*`, run `python3 scripts/azoth-deploy.py`, then verify with `python3 scripts/azoth-deploy.py --check`.
- Codex-only human-facing response style (BL-051 follow-on, not shared-platform canon):
  - For human-facing non-operational output in Codex, prefer short titled sections over large prose blocks when that improves scanability.
  - During longer reasoning or tool-use work, emit a brief public work-state cue before or between tool waves. Keep it to one short sentence naming the current action or decision; do not simulate hidden reasoning or narrate every micro-step.
  - Use hierarchy deliberately: lead with a one-sentence orienting summary, then use bullets or a compact table only when they make the next decision easier.
  - For end-of-work human communication, prefer a scan-first finish: start with a direct outcome sentence, then use 2-4 short titled sections or labeled lines such as `Result`, `What changed`, `Why it matters`, and `Next` only when they improve reading speed.
  - Separate scoped task outcome from session or admin state. If the task is done but closeout, approval, or optional follow-up remains, say that explicitly in the first two lines.
  - Selective emojis are allowed as navigational markers for summaries, approvals, status framing, and next steps; do not use them decoratively.
  - Use tables for comparisons, options, gate state, pipeline declarations, and tradeoffs only when the table will stay narrow inside the chat column.
  - If a table would become wide, wrap awkwardly, or cause horizontal scrolling, do not use it; switch to bullets, short labeled lines, or a two-part comparison instead.
  - Optimize for user intent and long-term continuity: restate the goal, make in-scope vs out-of-scope boundaries legible, and proactively offer only the nearest helpful next step.
  - Do not paragraph-dump. Do not produce decorative verbosity. Do not let visual structure become clutter.
  - Keep machine-facing artifacts terse and plain: BL-011 spawn payloads, BL-012 stage summaries, gates, evaluator scorecards, and schema-bound YAML/JSON/TOML stay optimized for determinism, not presentation flourish.
- Never add `Co-Authored-By` trailers.
'''

[features]
codex_hooks = true
multi_agent = true

[agents]
max_threads = 10
max_depth = 2

[sandbox_workspace_write]
network_access = false
