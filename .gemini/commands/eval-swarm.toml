If `.claude/commands/` is not present in your install, use the equivalent prompt under `.github/prompts/` (or your platform-specific mirror).

## When to use `/eval-swarm`

- Multiple branches or deliverables evaluated **in parallel** (`Task` evaluators in **one** orchestrator message).
- **Iterate** eval ‚Üí fix ‚Üí re-eval until thresholds clear (see max rounds in workflow).
- **Anti-bias:** Evaluators must **not** receive builder chat logs or long intent prose ‚Äî only **paths**, **rubric**, and **`threshold: 0.9`**.

## Threshold and disposition

Align with **`agents/tier3-meta/evaluator.agent.md`** weights.

| Outcome | Rule |
|---------|------|
| **PASS** | **overall ‚â• 0.90** and **no dimension &lt; 0.5** |
| **FAIL** | Otherwise ‚Äî schedule **Wave D** (fixes) and **new** evaluator `Task`s (never reuse the same eval thread after edits) |

