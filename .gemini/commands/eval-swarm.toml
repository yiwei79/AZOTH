4. **Aggregate** scores in the orchestrator only; evaluators do not read each other‚Äôs reports.
5. If any branch **FAIL**s, pass **gap summaries** (not full prior eval dumps) to planner/builder `Task`s, then re-run Wave C with **new** evaluators.

## Rules

- **Never** conflate this with **`/eval`** ‚Äî different numeric gate and process.
- **Never** paste author reasoning into an evaluator spawn ‚Äî **review-independence** (see `skills/subagent-router/SKILL.md`).
