# /eval-swarm $ARGUMENTS

**Higher bar than `/eval`:** use this command when you need **end-to-end parallel swarm** quality gates ‚Äî **overall ‚â• 0.90** (not 0.85), **fresh evaluator context per wave**, and **minimal prompts** (artifact paths + acceptance criteria only) so judges are not biased by author narrative.

