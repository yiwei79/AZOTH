# Azoth /park command — generated by azoth-deploy.py
description = "Park the current session for later resumption"
prompt = '''
# /park [next action]

Persist the current scoped session as a parked handoff, release the write claim,
and close the live scope gate so another session can work safely in the repo.

## Steps

1. **Read current scope**

   Read `.azoth/scope-gate.json` and confirm it contains a `session_id` and
   `goal`. This command is for an existing in-progress scope; it must not invent
   a new session.

2. **Choose the resume instruction**

   Use the prompt text after `/park` as the `next_action`.

   - If arguments are present, use them verbatim as the resume instruction.
   - If no arguments are present, default to:

     `Resume via /resume <session_id> and continue from the saved pipeline checkpoint.`

3. **Park the session**

   Run:

   ```bash
   python3 scripts/park_session.py --next-action "<resolved next_action>"
   ```

   Optional context may be passed through when available:

   - `--ide <ide>` when the current harness is known
   - `--active-run-id <run_id>` when this session has a resumable pipeline run

4. **Report the parked result**

   Summarize:

   - parked `session_id`
   - whether the write claim was released
   - that `.azoth/scope-gate.json` was closed
   - the exact resume path: `/resume <session_id>`
   - if the same conversation remains open, note that bare `resume` may restore the parked
     handoff directly from `.azoth/session-state.md`

## Resume Paths

- **Same conversation**: `/resume` — use the currently parked `session-state.md`
  handoff when `state: parked`
- **New conversation**: `/resume <session_id>` — reopen that parked session directly
- **Mechanical fallback**:

  ```bash
  python3 scripts/park_session.py --resume [--session-id <session_id>]
  ```

## Rules

- `/park` is **not** `/session-closeout` — do not append a W1 episode, bump the version, or run sync/commit steps.
- `/park` is for **interrupted but unfinished** sessions. Use `/session-closeout` when the work is complete.
- Explicit `resume` intent should not require a second approval wall once the user has
  already chosen the parked session to reopen.
- Never leave the write claim held after parking.
- Never preserve resumability by keeping the active scope gate open indefinitely.
'''
