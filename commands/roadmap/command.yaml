schema_version: 1
name: roadmap
display_name: /roadmap
description: Roadmap dashboard — versioned phases (D48) and upcoming work
agent: orchestrator
azoth_effect: read

body:
  mode: legacy_claude_markdown
  source_path: .claude/commands/roadmap.md

projection:
  claude:
    kind: native_command_markdown
    output_path: .claude/commands/roadmap.md
  cursor:
    kind: claude_command_toggle_surface
    output_path: .claude/commands/roadmap.md
  copilot:
    kind: prompt_markdown
    output_path: .github/prompts/roadmap.prompt.md
  opencode:
    kind: native_command_markdown
    output_path: .opencode/commands/roadmap.md
  codex:
    kind: skill_wrapper
    output_path: .agents/skills/azoth-roadmap/SKILL.md
    metadata_path: .agents/skills/azoth-roadmap/agents/openai.yaml
  gemini:
    kind: native_command_toml
    output_path: .gemini/commands/roadmap.toml
  antigravity:
    kind: workflow_markdown
    output_path: .agents/workflows/roadmap.md

migration:
  phase: canonical_body_batch_3_initiative_exit
  runtime_source_of_truth: commands/roadmap/command.yaml
  notes:
    - T-004 moves /roadmap onto the neutral command path.
    - .claude/commands/roadmap.md remains the authored semantic body during the bridge.

references:
  - .azoth/roadmap-specs/v0.2.0/T-004.yaml
  - docs/CANONICAL_COMMAND_CONTRACT.md
