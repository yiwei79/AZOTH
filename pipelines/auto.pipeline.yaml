# Auto Pipeline — Azoth Layer 3 (D23, D28)
# Dynamically composed by the Architect based on goal classification.
# Stage 0 always runs; composition_rules then select a conservative reference
# composition from the shared stage-family vocabulary.
# Rules are evaluated top-to-bottom; first matching condition wins.

name: auto
description: >
  Dynamic pipeline composed by the Architect after goal clarification (D23).
  Stage 0 always runs; remaining stages are selected by evaluating composition_rules
  against the classified goal. Human approves the composed pipeline before execution.
  Default behavior when no explicit pipeline is chosen.
preset: auto

# Stage 0 always executes — goal clarification and pipeline composition.
stages:
  - name: goal-clarification
    agent: architect
    outputs:
      - pipeline-composition
      - goal-classification
    gate:
      type: human
      action: approve-pipeline

# composition_rules: evaluated at runtime after goal-clarification (D23).
# classification fields are filled in by the Architect from the current goal.
# The selected row exposes reference_preset + ordered stage families +
# discovery policy for the orchestrator to compose against the latest context.
composition_rules:
  classification:
    scope: mixed           # kernel | skills | agents | pipelines | docs | mixed
    risk: additive         # governance-change | breaking-change | additive | cosmetic
    complexity: medium     # simple | medium | complex
    knowledge: known-pattern  # known-pattern | needs-research | novel | instruction-refinement

  shared_stage_families:
    - context-recall
    - discovery-evidence-research
    - architect-design
    - review
    - plan
    - execute
    - quality-gate
    - closeout

  discovery_triggers:
    - low-solution-confidence
    - conflicting-memory-or-pattern-evidence
    - cross-surface-drift
    - latest-context-dependency
    - gate-finding-evidence-insufficient

  # Rules are evaluated top-to-bottom. First match wins.
  rules:
    - condition: "risk == governance-change"
      reference_preset: full
      stage_families:
        - architect-design
        - review
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: conditional

    - condition: "scope == kernel"
      reference_preset: full
      stage_families:
        - architect-design
        - review
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: conditional

    - condition: "knowledge == needs-research"
      reference_preset: research
      stage_families:
        - discovery-evidence-research
        - architect-design
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: required

    - condition: "knowledge == instruction-refinement AND complexity == simple AND risk == additive"
      reference_preset: refactor
      stage_families:
        - context-recall
        - architect-design
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: conditional

    - condition: "knowledge == instruction-refinement"
      reference_preset: full
      stage_families:
        - context-recall
        - architect-design
        - review
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: conditional

    - condition: "scope == docs"
      reference_preset: docs
      stage_families:
        - architect-design
        - execute
        - closeout
      discovery_policy: conditional

    - condition: "complexity == simple AND risk == cosmetic"
      reference_preset: hotfix
      stage_families:
        - plan
        - execute
        - closeout
      discovery_policy: conditional

    - condition: "complexity == simple AND risk == additive"
      reference_preset: deliver
      stage_families:
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: conditional

    - condition: "complexity == medium AND risk == additive AND knowledge == known-pattern"
      reference_preset: deliver
      stage_families:
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: conditional

    - condition: "complexity == medium AND risk == additive"
      reference_preset: refactor
      stage_families:
        - architect-design
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: conditional

    - condition: "default"
      reference_preset: full
      stage_families:
        - architect-design
        - review
        - plan
        - execute
        - quality-gate
        - closeout
      discovery_policy: conditional

output: alignment-summary
