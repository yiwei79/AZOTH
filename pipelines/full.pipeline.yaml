# Full Pipeline — Azoth Layer 3 (D28)
# All 7 stages with governance review (D21).
# Use for: kernel changes, governance changes, breaking changes, anything with D24 mandatory-human gates.

name: full
description: >
  Complete 7-stage pipeline with governance review and all human alignment gates.
  Required for kernel modifications, governance changes, and breaking changes.
  Triggers mandatory human approval at goal, design, and final-delivery stages.
preset: full

stages:
  - name: goal-clarification
    agent: architect
    outputs:
      - pipeline-composition
    gate:
      type: human
      action: approve-pipeline

  - name: architect-design
    agent: architect
    tools:
      - explore
      - research
    inputs:
      - pipeline-composition
    outputs:
      - architecture-brief
    gate:
      type: human
      action: approve-design

  - name: governance-review
    agent: reviewer
    inputs:
      - architecture-brief
    outputs:
      - governance-disposition
    gate:
      type: agent
      agent: architect
      action: architect-disposition

  - name: planning
    agent: planner
    inputs:
      - architecture-brief
      - governance-disposition
    outputs:
      - task-plan
      - test-strategy
    gate:
      type: agent
      agent: architect
      action: architect-review

  - name: test-design
    agent: evaluator
    inputs:
      - task-plan
      - test-strategy
    outputs:
      - test-specs
      - acceptance-criteria
    gate:
      type: agent
      agent: architect
      action: architect-review

  - name: implementation
    agent: builder
    inputs:
      - task-plan
      - test-specs
    gate:
      type: agent
      agent: evaluator
      action: auto-test

  - name: architect-review
    agent: architect
    role: post-delivery-review
    inputs:
      - architecture-brief
      - acceptance-criteria
    gate:
      type: human
      action: final-approval

output: alignment-summary
