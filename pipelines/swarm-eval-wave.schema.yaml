# Azoth Swarm Eval-Wave Schema — P1-002
# JSON Schema (draft 2020-12) expressed in YAML for readability.
# Validates swarm wave specification files such as swarm-eval-wave.example.yaml
#
# Decisions:
#   D23 — Auto-pipeline: LLM-as-router
#   D28 — Pipeline presets (fan-out Iron Law: max_parallel ≤ 7)

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "azoth:swarm-wave:v1"
title: "Azoth Swarm Eval-Wave"
description: >
  Declarative specification of a multi-wave eval swarm.
  Encodes the wave topology from .claude/workflows/enterprise/e2e-swarm-eval-loop.md
  as machine-readable YAML validated by tests/test_swarm_wave_schema.py.
  Canonical data: pipelines/swarm-eval-wave.example.yaml
type: object
additionalProperties: false
required:
  - schema_version
  - description
  - constants
  - waves

properties:

  schema_version:
    type: integer
    const: 1
    description: "Schema version — bump on any breaking change. Always 1 for this revision."

  description:
    type: string
    minLength: 1
    description: "Human-readable description of this wave specification."

  constants:
    $ref: "#/$defs/constants"

  waves:
    type: array
    minItems: 1
    description: "Ordered list of wave definitions executed by the queen orchestrator."
    items:
      $ref: "#/$defs/wave_def"

$defs:

  constants:
    type: object
    additionalProperties: false
    required: [eval_threshold, max_iteration_rounds]
    properties:
      eval_threshold:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Minimum overall score to PASS. e2e-swarm-eval-loop uses 0.9."
      max_iteration_rounds:
        type: integer
        minimum: 1
        description: "Maximum C→D iteration rounds before stopping for human steering."

  agent_name:
    type: string
    enum:
      - architect
      - planner
      - builder
      - reviewer
      - researcher
      - research-orchestrator
      - evaluator
      - prompt-engineer
      - agent-crafter
      - context-architect
    description: "One of the 10 canonical agent archetypes (D7). See agents/ for definitions."

  wave_def:
    type: object
    additionalProperties: false
    required: [stage_id, wave, agent, max_parallel]
    properties:
      stage_id:
        type: string
        pattern: "^[a-z][a-z0-9_-]*$"
        description: "Stable snake_case identifier for this wave (e.g. wave_a_build)."
      wave:
        type: string
        enum: [A, B, C, D]
        description: "Wave label matching the queen topology (A=build, B=review, C=eval, D=fix)."
      agent:
        $ref: "#/$defs/agent_name"
      max_parallel:
        type: integer
        minimum: 1
        maximum: 7
        description: "Max simultaneous Task() spawns in this wave. Iron Law cap is 7."
      description:
        type: string
        description: "Optional human-readable note for this wave."
      threshold:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Eval pass threshold. Required when agent=evaluator."
      optional:
        type: boolean
        description: "If true, this wave may be skipped by the queen when no work applies."
    if:
      properties:
        agent:
          const: evaluator
    then:
      required: [threshold]
