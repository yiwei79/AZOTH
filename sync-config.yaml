# Azoth Sync Configuration
# Sanitization rules for pattern extraction from source frameworks.

sanitize:
  # String patterns to replace with {{REDACTED}} in synced files.
  # Add your org-specific names, URLs, and identifiers here.
  strip_patterns:
    - "{{REDACTED}}"
    - "{{REDACTED}}"
    - "{{REDACTED}}"
    - "{{REDACTED}}"
    - "{{REDACTED}}"
    - "{{REDACTED}}"
    - "{{REDACTED}}"
    - "{{REDACTED}}"
    - "{{REDACTED}}"

  # Path prefixes to exclude from sync entirely.
  # Files under these paths will never be proposed for sync.
  strip_paths:
    - "Projects/"
    - "workspace/SESSION_MEMORY.md"
    - ".env"
    - "credentials"
    - "secrets"
    - ".claude/commands/"
    - ".claude/settings.json"

# Directories to scan in the source framework.
# Only files under these directories (with syncable extensions) are considered.
scan_dirs:
  - skills
  - agents
  - instructions
  - commands
  - pipelines

# File extensions that are eligible for sync.
scan_extensions:
  - .md
  - .yaml
  - .yml
  - .json
  - .py
  - .txt

# ── Product Extraction Profile (D38) ──────────────────────
# Used when extracting the public `azoth` product from this scaffold.
# Implementation: dedicated extractor script (P4-004) — not azoth-sync.py (Tier 1→2 only).
#
# Pipeline order (mandatory for public publish — reviewer gate P4-004):
#   1. Select files: copy tree honoring exclude_paths (prefix match from repo root).
#   2. apply_transforms: run each `transform` entry (requires scripts — declarative spec only here).
#   3. apply_sanitize: apply `sanitize.strip_patterns` to eligible text files (same strings as Tier 1→2).
# Skipping (2) or (3) can ship wrong CLAUDE.md/azoth.yaml or leak org-specific strings (D35).
product_extraction:
  target_repo: azoth
  mode: scaffold-to-product

  extraction_pipeline:
    - copy_tree_respecting_excludes
    - apply_transforms
    - apply_sanitize_strip_patterns

  # Paths to EXCLUDE from the public product
  # (scaffold-only artifacts that don't ship to consumers)
  exclude_paths:
    # Never ship scaffold git history into the product tree (extract uses source.rglob).
    - ".git/"
    # Never ship workstation-local generated state, caches, or ignored runtime files.
    - ".DS_Store"
    - ".pytest_cache/"
    - ".ruff_cache/"
    - ".mypy_cache/"
    - ".tox/"
    - ".nox/"
    - ".venv/"
    - "venv/"
    - "__pycache__/"
    - "dist/"
    - "build/"
    # Entire `.azoth/` in root-azoth is workshop/runtime: backlog, roadmap, bootloader,
    # handoffs, proposals, gates, inbox, memory, telemetry, session orientation, etc.
    # Consumer `.azoth/kernel/` is created by install from `kernel/` (D42), not by copying this tree.
    - ".azoth/"
    - ".claude/commands/"          # Scaffold dev commands, not consumer commands
    - ".claude/hooks/"             # Scaffold-only Claude Code hook scripts, not consumer install artifacts
    - ".claude/settings.json"      # Scaffold dev settings
    - ".claude/settings.local.json"
    - ".claude/worktrees/"          # Claude Code local worktree state
    - ".codex/hooks.mode.local"
    - ".codex/permission_profile.local"
    - ".github/"                   # Scaffold CI/CD; public repo gets its own minimal CI (P4-004)
    # Keep kernel/templates/: install.sh/install.ps1 render consumer boot files from these templates.
    - "research_antigravity_parity/"  # Scaffold research workspace, not public product content
    - "docs/DAY0_TUTORIAL.md"      # Scaffold-specific tutorial
    - "tests/"                     # Scaffold tests (product gets its own)
    - "workspace/"
    - "root-azoth.code-workspace"

  # Files to TRANSFORM during extraction
  # (content changes needed for consumer context)
  # Actions are defined here only; implementer MUST implement in extractor (no silent no-op).
  transform:
    - source: "CLAUDE.md"
      action: "regenerate-from-template"
      template: "kernel/templates/CLAUDE.md.template"
    - source: "azoth.yaml"
      action: "set-scope-mode"
      value: "project"
